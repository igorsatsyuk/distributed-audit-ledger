server:
  port: 8084

spring:
  application:
    name: query-service

  r2dbc:
    url: ${R2DBC_URL:r2dbc:postgresql://localhost:5432/audit_ledger}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}

  flyway:
    enabled: false   # Query service does NOT run migrations — event-store owns the schema

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

logging:
  level:
    lt.satsyuk.distributed.audit: DEBUG
