server:
  port: 8084

spring:
  application:
    name: query-service

  r2dbc:
    url: ${R2DBC_URL:r2dbc:postgresql://localhost:5432/audit_ledger}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}

  flyway:
    enabled: false   # Query service does NOT run migrations — event-store owns the schema

  quartz:
    job-store-type: memory

auth:
  jwt:
    secret: ${AUTH_JWT_SECRET}
    issuer: ${AUTH_JWT_ISSUER}
    expiration: ${AUTH_JWT_EXPIRATION}

web3j:
  client-address: ${GANACHE_RPC_URL:http://localhost:8545}
  contract-address: ${AUDIT_LEDGER_CONTRACT_ADDRESS:}
  contract-deployment-block: ${AUDIT_LEDGER_CONTRACT_DEPLOYMENT_BLOCK:0}

reconciliation:
  batch-size: ${RECONCILIATION_BATCH_SIZE:200}
  schedule:
    enabled: ${RECONCILIATION_SCHEDULE_ENABLED:true}
    cron: "${RECONCILIATION_SCHEDULE_CRON:0 0/30 * * * ?}"

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

logging:
  level:
    lt.satsyuk.distributed.audit: DEBUG
