server:
  port: 8082

spring:
  application:
    name: event-store-service

  r2dbc:
    url: ${R2DBC_URL:r2dbc:postgresql://localhost:5432/audit_ledger}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}

  flyway:
    enabled: true
    url: ${DB_URL:jdbc:postgresql://localhost:5432/audit_ledger}
    user: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    locations: classpath:db/migration
    schemas: audit
    baseline-on-migrate: true

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: event-store-consumer

kafka:
  topics:
    audit-events: user.login.events
    user-login-events: user.login.events

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

logging:
  level:
    lt.satsyuk.distributed.audit: DEBUG
