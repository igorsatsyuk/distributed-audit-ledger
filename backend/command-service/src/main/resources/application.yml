server:
  port: 8081

spring:
  application:
    name: command-service

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.add.type.headers: false

kafka:
  topics:
    audit-events: user.login.events
    user-login-events: user.login.events

auth:
  jwt:
    secret: ${AUTH_JWT_SECRET:distributed-audit-ledger-development-secret-please-change}
    issuer: ${AUTH_JWT_ISSUER:distributed-audit-ledger}
    expiration: ${AUTH_JWT_EXPIRATION:PT1H}
  users:
    - username: ${AUTH_ADMIN_USERNAME:admin}
      password: ${AUTH_ADMIN_PASSWORD:admin123!}
      roles: [ADMIN, AUDITOR, USER]
    - username: ${AUTH_AUDITOR_USERNAME:auditor}
      password: ${AUTH_AUDITOR_PASSWORD:auditor123!}
      roles: [AUDITOR]
    - username: ${AUTH_USER_USERNAME:user}
      password: ${AUTH_USER_PASSWORD:user123!}
      roles: [USER]

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

logging:
  level:
    lt.satsyuk.distributed.audit: DEBUG
