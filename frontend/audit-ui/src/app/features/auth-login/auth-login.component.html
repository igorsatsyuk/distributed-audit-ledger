<section class="login-shell">
  <mat-card class="login-card">
    <h2>Sign In</h2>

    <form [formGroup]="form" (ngSubmit)="submit()" class="login-form" autocomplete="on">
      <mat-form-field appearance="outline">
        <mat-label>Username</mat-label>
        <input matInput id="username" formControlName="username" autocomplete="username" />
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>Password</mat-label>
        <input matInput id="password" type="password" formControlName="password" autocomplete="current-password" />
      </mat-form-field>

      @if (errorMessage()) {
        <p class="login-error">{{ errorMessage() }}</p>
      }

      <button mat-raised-button color="primary" type="submit" [disabled]="loading()">
        {{ loading() ? 'Signing in...' : 'Sign in' }}
      </button>
    </form>
  </mat-card>
</section>
