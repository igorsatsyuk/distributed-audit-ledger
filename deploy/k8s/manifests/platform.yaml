apiVersion: v1
kind: Namespace
metadata:
  name: dal
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: dal-config
  namespace: dal
data:
  KAFKA_BOOTSTRAP_SERVERS: dal-kafka:9092
  R2DBC_URL: r2dbc:postgresql://dal-postgres:5432/audit_ledger
  DB_URL: jdbc:postgresql://dal-postgres:5432/audit_ledger
  MANAGEMENT_ENDPOINT_HEALTH_PROBES_ENABLED: "true"
  GANACHE_RPC_URL: "__SET_GANACHE_RPC_URL__"
  RECONCILIATION_BATCH_SIZE: "200"
  RECONCILIATION_SCHEDULE_ENABLED: "false"
  RECONCILIATION_SCHEDULE_CRON: "0 0/30 * * * ?"
  RECONCILIATION_SCHEDULE_TIMEOUT: PT15M
---
apiVersion: v1
kind: Secret
metadata:
  name: dal-secrets
  namespace: dal
type: Opaque
stringData:
  DB_USERNAME: "__SET_DB_USERNAME__"
  DB_PASSWORD: "__SET_DB_PASSWORD__"
  AUTH_JWT_SECRET: "__SET_AUTH_JWT_SECRET__"
  AUTH_JWT_ISSUER: distributed-audit-ledger
  AUTH_JWT_EXPIRATION: PT1H
  AUTH_ADMIN_USERNAME: "__SET_AUTH_ADMIN_USERNAME__"
  AUTH_ADMIN_PASSWORD: "__SET_AUTH_ADMIN_PASSWORD__"
  AUTH_AUDITOR_USERNAME: "__SET_AUTH_AUDITOR_USERNAME__"
  AUTH_AUDITOR_PASSWORD: "__SET_AUTH_AUDITOR_PASSWORD__"
  AUTH_USER_USERNAME: "__SET_AUTH_USER_USERNAME__"
  AUTH_USER_PASSWORD: "__SET_AUTH_USER_PASSWORD__"
  # Set blockchain values before producing events, otherwise audit-writer will fail writes.
  AUDIT_LEDGER_CONTRACT_ADDRESS: "__SET_AUDIT_LEDGER_CONTRACT_ADDRESS__"
  # Keep numeric for Spring binding; override with real deployment block for non-local RPC.
  AUDIT_LEDGER_CONTRACT_DEPLOYMENT_BLOCK: "0"
  GANACHE_PRIVATE_KEY: "__SET_GANACHE_PRIVATE_KEY__"
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: dal-postgres
  namespace: dal
spec:
  serviceName: dal-postgres-headless
  replicas: 1
  selector:
    matchLabels:
      app: dal-postgres
  template:
    metadata:
      labels:
        app: dal-postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: audit_ledger
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: dal-secrets
                  key: DB_USERNAME
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: dal-secrets
                  key: DB_PASSWORD
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
  volumeClaimTemplates:
    - metadata:
        name: postgres-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 10Gi
---
apiVersion: v1
kind: Service
metadata:
  name: dal-postgres-headless
  namespace: dal
spec:
  clusterIP: None
  selector:
    app: dal-postgres
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
---
apiVersion: v1
kind: Service
metadata:
  name: dal-postgres
  namespace: dal
spec:
  selector:
    app: dal-postgres
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: dal-zookeeper
  namespace: dal
spec:
  serviceName: dal-zookeeper-headless
  replicas: 1
  selector:
    matchLabels:
      app: dal-zookeeper
  template:
    metadata:
      labels:
        app: dal-zookeeper
    spec:
      containers:
        - name: zookeeper
          image: confluentinc/cp-zookeeper:7.6.1
          ports:
            - containerPort: 2181
          env:
            - name: ZOOKEEPER_CLIENT_PORT
              value: "2181"
            - name: ZOOKEEPER_TICK_TIME
              value: "2000"
          volumeMounts:
            - name: zookeeper-data
              mountPath: /var/lib/zookeeper/data
  volumeClaimTemplates:
    - metadata:
        name: zookeeper-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 5Gi
---
apiVersion: v1
kind: Service
metadata:
  name: dal-zookeeper-headless
  namespace: dal
spec:
  clusterIP: None
  selector:
    app: dal-zookeeper
  ports:
    - name: client
      port: 2181
      targetPort: 2181
---
apiVersion: v1
kind: Service
metadata:
  name: dal-zookeeper
  namespace: dal
spec:
  selector:
    app: dal-zookeeper
  ports:
    - name: client
      port: 2181
      targetPort: 2181
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: dal-kafka
  namespace: dal
spec:
  serviceName: dal-kafka-headless
  replicas: 1
  selector:
    matchLabels:
      app: dal-kafka
  template:
    metadata:
      labels:
        app: dal-kafka
    spec:
      containers:
        - name: kafka
          image: confluentinc/cp-kafka:7.6.1
          ports:
            - containerPort: 9092
          env:
            - name: KAFKA_BROKER_ID
              value: "1"
            - name: KAFKA_ZOOKEEPER_CONNECT
              value: dal-zookeeper:2181
            - name: KAFKA_LISTENERS
              value: PLAINTEXT://0.0.0.0:9092
            - name: KAFKA_ADVERTISED_LISTENERS
              value: PLAINTEXT://dal-kafka:9092
            - name: KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR
              value: "1"
            - name: KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR
              value: "1"
            - name: KAFKA_TRANSACTION_STATE_LOG_MIN_ISR
              value: "1"
            - name: KAFKA_AUTO_CREATE_TOPICS_ENABLE
              value: "true"
          volumeMounts:
            - name: kafka-data
              mountPath: /var/lib/kafka/data
  volumeClaimTemplates:
    - metadata:
        name: kafka-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 10Gi
---
apiVersion: v1
kind: Service
metadata:
  name: dal-kafka-headless
  namespace: dal
spec:
  clusterIP: None
  selector:
    app: dal-kafka
  ports:
    - name: kafka
      port: 9092
      targetPort: 9092
---
apiVersion: v1
kind: Service
metadata:
  name: dal-kafka
  namespace: dal
spec:
  selector:
    app: dal-kafka
  ports:
    - name: kafka
      port: 9092
      targetPort: 9092
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: command-service
  namespace: dal
spec:
  replicas: 1
  selector:
    matchLabels:
      app: command-service
  template:
    metadata:
      labels:
        app: command-service
    spec:
      containers:
        - name: command-service
          image: ghcr.io/distributed-audit-ledger/command-service:0.1.0
          ports:
            - containerPort: 8081
          envFrom:
            - configMapRef:
                name: dal-config
            - secretRef:
                name: dal-secrets
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8081
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8081
            initialDelaySeconds: 30
            periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: command-service
  namespace: dal
spec:
  selector:
    app: command-service
  ports:
    - name: http
      port: 8081
      targetPort: 8081
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: event-store-service
  namespace: dal
spec:
  replicas: 1
  selector:
    matchLabels:
      app: event-store-service
  template:
    metadata:
      labels:
        app: event-store-service
    spec:
      containers:
        - name: event-store-service
          image: ghcr.io/distributed-audit-ledger/event-store-service:0.1.0
          ports:
            - containerPort: 8082
          envFrom:
            - configMapRef:
                name: dal-config
            - secretRef:
                name: dal-secrets
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8082
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8082
            initialDelaySeconds: 30
            periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: event-store-service
  namespace: dal
spec:
  selector:
    app: event-store-service
  ports:
    - name: http
      port: 8082
      targetPort: 8082
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: audit-writer-service
  namespace: dal
spec:
  replicas: 1
  selector:
    matchLabels:
      app: audit-writer-service
  template:
    metadata:
      labels:
        app: audit-writer-service
    spec:
      containers:
        - name: audit-writer-service
          image: ghcr.io/distributed-audit-ledger/audit-writer-service:0.1.0
          ports:
            - containerPort: 8083
          envFrom:
            - configMapRef:
                name: dal-config
            - secretRef:
                name: dal-secrets
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8083
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8083
            initialDelaySeconds: 30
            periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: audit-writer-service
  namespace: dal
spec:
  selector:
    app: audit-writer-service
  ports:
    - name: http
      port: 8083
      targetPort: 8083
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: query-service
  namespace: dal
spec:
  replicas: 1
  selector:
    matchLabels:
      app: query-service
  template:
    metadata:
      labels:
        app: query-service
    spec:
      containers:
        - name: query-service
          image: ghcr.io/distributed-audit-ledger/query-service:0.1.0
          ports:
            - containerPort: 8084
          envFrom:
            - configMapRef:
                name: dal-config
            - secretRef:
                name: dal-secrets
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8084
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8084
            initialDelaySeconds: 30
            periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: query-service
  namespace: dal
spec:
  selector:
    app: query-service
  ports:
    - name: http
      port: 8084
      targetPort: 8084
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: audit-ui
  namespace: dal
spec:
  replicas: 1
  selector:
    matchLabels:
      app: audit-ui
  template:
    metadata:
      labels:
        app: audit-ui
    spec:
      containers:
        - name: audit-ui
          image: ghcr.io/distributed-audit-ledger/audit-ui:0.1.0
          ports:
            - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: audit-ui
  namespace: dal
spec:
  selector:
    app: audit-ui
  ports:
    - name: http
      port: 80
      targetPort: 80
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: dal-ingress
  namespace: dal
spec:
  ingressClassName: nginx
  rules:
    - host: dal.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: audit-ui
                port:
                  number: 80
          - path: /commands
            pathType: Prefix
            backend:
              service:
                name: command-service
                port:
                  number: 8081
          - path: /auth
            pathType: Prefix
            backend:
              service:
                name: command-service
                port:
                  number: 8081
          - path: /api/audit-logs
            pathType: Prefix
            backend:
              service:
                name: query-service
                port:
                  number: 8084
          - path: /api/reconciliation
            pathType: Prefix
            backend:
              service:
                name: query-service
                port:
                  number: 8084

