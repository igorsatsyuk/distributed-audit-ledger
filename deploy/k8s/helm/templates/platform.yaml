{{ $ns := include "dal.namespace" . }}
{{ $configName := include "dal.configName" . }}
{{ $secretsName := include "dal.secretsName" . }}
{{ $postgresName := include "dal.postgresName" . }}
{{ $zookeeperName := include "dal.zookeeperName" . }}
{{ $kafkaName := include "dal.kafkaName" . }}
{{ $commandServiceName := include "dal.commandServiceName" . }}
{{ $eventStoreServiceName := include "dal.eventStoreServiceName" . }}
{{ $auditWriterServiceName := include "dal.auditWriterServiceName" . }}
{{ $queryServiceName := include "dal.queryServiceName" . }}
{{ $auditUiName := include "dal.auditUiName" . }}
{{ $ingressName := include "dal.ingressName" . }}
{{ $postgresHeadlessName := printf "%s-headless" $postgresName | trunc 63 | trimSuffix "-" }}
{{ $zookeeperHeadlessName := printf "%s-headless" $zookeeperName | trunc 63 | trimSuffix "-" }}
{{ $kafkaHeadlessName := printf "%s-headless" $kafkaName | trunc 63 | trimSuffix "-" }}
{{- $secretRefName := $secretsName -}}
{{- if not .Values.secrets.create -}}
{{- $secretRefName = required "secrets.existingSecretName is required when secrets.create=false" .Values.secrets.existingSecretName -}}
{{- end -}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ $configName }}
  namespace: {{ $ns }}
data:
  KAFKA_BOOTSTRAP_SERVERS: {{ default (printf "%s:9092" $kafkaName) .Values.config.kafkaBootstrapServers | quote }}
  R2DBC_URL: {{ default (printf "r2dbc:postgresql://%s:5432/audit_ledger" $postgresName) .Values.config.r2dbcUrl | quote }}
  DB_URL: {{ default (printf "jdbc:postgresql://%s:5432/audit_ledger" $postgresName) .Values.config.dbUrl | quote }}
  MANAGEMENT_ENDPOINT_HEALTH_PROBES_ENABLED: {{ .Values.config.managementEndpointHealthProbesEnabled | quote }}
  GANACHE_RPC_URL: {{ required "config.ganacheRpcUrl is required for blockchain-backed query-service endpoints" .Values.config.ganacheRpcUrl | quote }}
  RECONCILIATION_BATCH_SIZE: {{ .Values.config.reconciliationBatchSize | quote }}
  RECONCILIATION_SCHEDULE_ENABLED: {{ .Values.config.reconciliationScheduleEnabled | quote }}
  RECONCILIATION_SCHEDULE_CRON: {{ .Values.config.reconciliationScheduleCron | quote }}
  RECONCILIATION_SCHEDULE_TIMEOUT: {{ .Values.config.reconciliationScheduleTimeout | quote }}
---
{{ if .Values.secrets.create }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretsName }}
  namespace: {{ $ns }}
type: Opaque
stringData:
  DB_USERNAME: {{ required "secrets.dbUsername is required" .Values.secrets.dbUsername | quote }}
  DB_PASSWORD: {{ required "secrets.dbPassword is required" .Values.secrets.dbPassword | quote }}
  AUTH_JWT_SECRET: {{ required "secrets.jwtSecret is required" .Values.secrets.jwtSecret | quote }}
  AUTH_JWT_ISSUER: {{ .Values.secrets.jwtIssuer | quote }}
  AUTH_JWT_EXPIRATION: {{ .Values.secrets.jwtExpiration | quote }}
  AUTH_ADMIN_USERNAME: {{ required "secrets.authAdminUsername is required" .Values.secrets.authAdminUsername | quote }}
  AUTH_ADMIN_PASSWORD: {{ required "secrets.authAdminPassword is required" .Values.secrets.authAdminPassword | quote }}
  AUTH_AUDITOR_USERNAME: {{ required "secrets.authAuditorUsername is required" .Values.secrets.authAuditorUsername | quote }}
  AUTH_AUDITOR_PASSWORD: {{ required "secrets.authAuditorPassword is required" .Values.secrets.authAuditorPassword | quote }}
  AUTH_USER_USERNAME: {{ required "secrets.authUserUsername is required" .Values.secrets.authUserUsername | quote }}
  AUTH_USER_PASSWORD: {{ required "secrets.authUserPassword is required" .Values.secrets.authUserPassword | quote }}
  AUDIT_LEDGER_CONTRACT_ADDRESS: {{ required "secrets.auditLedgerContractAddress is required for blockchain-backed query-service endpoints" .Values.secrets.auditLedgerContractAddress | quote }}
  AUDIT_LEDGER_CONTRACT_DEPLOYMENT_BLOCK: {{ default "0" .Values.secrets.auditLedgerContractDeploymentBlock | quote }}
  GANACHE_PRIVATE_KEY: {{ if .Values.components.auditWriter.enabled }}{{ required "secrets.ganachePrivateKey is required when components.auditWriter.enabled=true" .Values.secrets.ganachePrivateKey | quote }}{{ else }}{{ .Values.secrets.ganachePrivateKey | quote }}{{ end }}
---
{{ end }}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ $postgresName }}
  namespace: {{ $ns }}
spec:
  serviceName: {{ $postgresHeadlessName }}
  replicas: 1
  selector:
    matchLabels:
      app: {{ $postgresName }}
  template:
    metadata:
      labels:
        app: {{ $postgresName }}
    spec:
      containers:
        - name: postgres
          image: {{ .Values.images.postgres }}
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: audit_ledger
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: {{ $secretRefName }}
                  key: DB_USERNAME
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ $secretRefName }}
                  key: DB_PASSWORD
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
          resources:
{{ toYaml .Values.resources.postgres | nindent 12 }}
  volumeClaimTemplates:
    - metadata:
        name: postgres-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: {{ .Values.persistence.postgresSize }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ $postgresHeadlessName }}
  namespace: {{ $ns }}
spec:
  clusterIP: None
  selector:
    app: {{ $postgresName }}
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
---
apiVersion: v1
kind: Service
metadata:
  name: {{ $postgresName }}
  namespace: {{ $ns }}
spec:
  selector:
    app: {{ $postgresName }}
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ $zookeeperName }}
  namespace: {{ $ns }}
spec:
  serviceName: {{ $zookeeperHeadlessName }}
  replicas: 1
  selector:
    matchLabels:
      app: {{ $zookeeperName }}
  template:
    metadata:
      labels:
        app: {{ $zookeeperName }}
    spec:
      containers:
        - name: zookeeper
          image: {{ .Values.images.zookeeper }}
          ports:
            - containerPort: 2181
          env:
            - name: ZOOKEEPER_CLIENT_PORT
              value: "2181"
            - name: ZOOKEEPER_TICK_TIME
              value: "2000"
          volumeMounts:
            - name: zookeeper-data
              mountPath: /var/lib/zookeeper/data
          resources:
{{ toYaml .Values.resources.zookeeper | nindent 12 }}
  volumeClaimTemplates:
    - metadata:
        name: zookeeper-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: {{ .Values.persistence.zookeeperSize }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ $zookeeperHeadlessName }}
  namespace: {{ $ns }}
spec:
  clusterIP: None
  selector:
    app: {{ $zookeeperName }}
  ports:
    - name: client
      port: 2181
      targetPort: 2181
---
apiVersion: v1
kind: Service
metadata:
  name: {{ $zookeeperName }}
  namespace: {{ $ns }}
spec:
  selector:
    app: {{ $zookeeperName }}
  ports:
    - name: client
      port: 2181
      targetPort: 2181
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ $kafkaName }}
  namespace: {{ $ns }}
spec:
  serviceName: {{ $kafkaHeadlessName }}
  replicas: 1
  selector:
    matchLabels:
      app: {{ $kafkaName }}
  template:
    metadata:
      labels:
        app: {{ $kafkaName }}
    spec:
      containers:
        - name: kafka
          image: {{ .Values.images.kafka }}
          ports:
            - containerPort: 9092
          env:
            - name: KAFKA_BROKER_ID
              value: "1"
            - name: KAFKA_ZOOKEEPER_CONNECT
              value: {{ printf "%s:2181" $zookeeperName | quote }}
            - name: KAFKA_LISTENERS
              value: PLAINTEXT://0.0.0.0:9092
            - name: KAFKA_ADVERTISED_LISTENERS
              value: {{ printf "PLAINTEXT://%s:9092" $kafkaName | quote }}
            - name: KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR
              value: "1"
            - name: KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR
              value: "1"
            - name: KAFKA_TRANSACTION_STATE_LOG_MIN_ISR
              value: "1"
            - name: KAFKA_AUTO_CREATE_TOPICS_ENABLE
              value: "true"
          volumeMounts:
            - name: kafka-data
              mountPath: /var/lib/kafka/data
          resources:
{{ toYaml .Values.resources.kafka | nindent 12 }}
  volumeClaimTemplates:
    - metadata:
        name: kafka-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: {{ .Values.persistence.kafkaSize }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ $kafkaHeadlessName }}
  namespace: {{ $ns }}
spec:
  clusterIP: None
  selector:
    app: {{ $kafkaName }}
  ports:
    - name: kafka
      port: 9092
      targetPort: 9092
---
apiVersion: v1
kind: Service
metadata:
  name: {{ $kafkaName }}
  namespace: {{ $ns }}
spec:
  selector:
    app: {{ $kafkaName }}
  ports:
    - name: kafka
      port: 9092
      targetPort: 9092
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $commandServiceName }}
  namespace: {{ $ns }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: {{ $commandServiceName }}
  template:
    metadata:
      labels:
        app: {{ $commandServiceName }}
    spec:
      containers:
        - name: command-service
          image: {{ .Values.images.commandService }}
          ports:
            - containerPort: 8081
          envFrom:
            - configMapRef:
                name: {{ $configName }}
            - secretRef:
                name: {{ $secretRefName }}
          resources:
{{ toYaml .Values.resources.commandService | nindent 12 }}
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8081
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8081
            initialDelaySeconds: 30
            periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: {{ $commandServiceName }}
  namespace: {{ $ns }}
spec:
  selector:
    app: {{ $commandServiceName }}
  ports:
    - name: http
      port: 8081
      targetPort: 8081
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $eventStoreServiceName }}
  namespace: {{ $ns }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: {{ $eventStoreServiceName }}
  template:
    metadata:
      labels:
        app: {{ $eventStoreServiceName }}
    spec:
      containers:
        - name: event-store-service
          image: {{ .Values.images.eventStoreService }}
          ports:
            - containerPort: 8082
          envFrom:
            - configMapRef:
                name: {{ $configName }}
            - secretRef:
                name: {{ $secretRefName }}
          resources:
{{ toYaml .Values.resources.eventStoreService | nindent 12 }}
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8082
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8082
            initialDelaySeconds: 30
            periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: {{ $eventStoreServiceName }}
  namespace: {{ $ns }}
spec:
  selector:
    app: {{ $eventStoreServiceName }}
  ports:
    - name: http
      port: 8082
      targetPort: 8082
{{ if .Values.components.auditWriter.enabled }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $auditWriterServiceName }}
  namespace: {{ $ns }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: {{ $auditWriterServiceName }}
  template:
    metadata:
      labels:
        app: {{ $auditWriterServiceName }}
    spec:
      containers:
        - name: audit-writer-service
          image: {{ .Values.images.auditWriterService }}
          ports:
            - containerPort: 8083
          envFrom:
            - configMapRef:
                name: {{ $configName }}
            - secretRef:
                name: {{ $secretRefName }}
          resources:
{{ toYaml .Values.resources.auditWriterService | nindent 12 }}
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8083
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8083
            initialDelaySeconds: 30
            periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: {{ $auditWriterServiceName }}
  namespace: {{ $ns }}
spec:
  selector:
    app: {{ $auditWriterServiceName }}
  ports:
    - name: http
      port: 8083
      targetPort: 8083
{{ end }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $queryServiceName }}
  namespace: {{ $ns }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: {{ $queryServiceName }}
  template:
    metadata:
      labels:
        app: {{ $queryServiceName }}
    spec:
      containers:
        - name: query-service
          image: {{ .Values.images.queryService }}
          ports:
            - containerPort: 8084
          envFrom:
            - configMapRef:
                name: {{ $configName }}
            - secretRef:
                name: {{ $secretRefName }}
          resources:
{{ toYaml .Values.resources.queryService | nindent 12 }}
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8084
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8084
            initialDelaySeconds: 30
            periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: {{ $queryServiceName }}
  namespace: {{ $ns }}
spec:
  selector:
    app: {{ $queryServiceName }}
  ports:
    - name: http
      port: 8084
      targetPort: 8084
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $auditUiName }}
  namespace: {{ $ns }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: {{ $auditUiName }}
  template:
    metadata:
      labels:
        app: {{ $auditUiName }}
    spec:
      containers:
        - name: audit-ui
          image: {{ .Values.images.auditUi }}
          ports:
            - containerPort: 80
          resources:
{{ toYaml .Values.resources.auditUi | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ $auditUiName }}
  namespace: {{ $ns }}
spec:
  selector:
    app: {{ $auditUiName }}
  ports:
    - name: http
      port: 80
      targetPort: 80
{{ if .Values.ingress.enabled }}
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ $ingressName }}
  namespace: {{ $ns }}
spec:
  ingressClassName: {{ .Values.ingress.className }}
  rules:
    - host: {{ .Values.ingress.host }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ $auditUiName }}
                port:
                  number: 80
          - path: /commands
            pathType: Prefix
            backend:
              service:
                name: {{ $commandServiceName }}
                port:
                  number: 8081
          - path: /auth
            pathType: Prefix
            backend:
              service:
                name: {{ $commandServiceName }}
                port:
                  number: 8081
          - path: /api/audit-logs
            pathType: Prefix
            backend:
              service:
                name: {{ $queryServiceName }}
                port:
                  number: 8084
          - path: /api/reconciliation
            pathType: Prefix
            backend:
              service:
                name: {{ $queryServiceName }}
                port:
                  number: 8084
{{ end }}

