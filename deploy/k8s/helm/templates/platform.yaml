{{ $ns := include "dal.namespace" . }}
{{ if .Values.createNamespace }}
apiVersion: v1
kind: Namespace
metadata:
  name: {{ $ns }}
  labels:
    {{- include "dal.labels" . | nindent 4 }}
---
{{ end }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: dal-config
  namespace: {{ $ns }}
data:
  KAFKA_BOOTSTRAP_SERVERS: {{ .Values.config.kafkaBootstrapServers | quote }}
  R2DBC_URL: {{ .Values.config.r2dbcUrl | quote }}
  DB_URL: {{ .Values.config.dbUrl | quote }}
  GANACHE_RPC_URL: {{ .Values.config.ganacheRpcUrl | quote }}
  RECONCILIATION_BATCH_SIZE: {{ .Values.config.reconciliationBatchSize | quote }}
  RECONCILIATION_SCHEDULE_ENABLED: {{ .Values.config.reconciliationScheduleEnabled | quote }}
  RECONCILIATION_SCHEDULE_CRON: {{ .Values.config.reconciliationScheduleCron | quote }}
  RECONCILIATION_SCHEDULE_TIMEOUT: {{ .Values.config.reconciliationScheduleTimeout | quote }}
  QUERY_SERVICE_BASE_URL: {{ .Values.config.queryServiceBaseUrl | quote }}
---
apiVersion: v1
kind: Secret
metadata:
  name: dal-secrets
  namespace: {{ $ns }}
type: Opaque
stringData:
  DB_USERNAME: {{ required "secrets.dbUsername is required" .Values.secrets.dbUsername | quote }}
  DB_PASSWORD: {{ required "secrets.dbPassword is required" .Values.secrets.dbPassword | quote }}
  AUTH_JWT_SECRET: {{ required "secrets.jwtSecret is required" .Values.secrets.jwtSecret | quote }}
  AUTH_JWT_ISSUER: {{ .Values.secrets.jwtIssuer | quote }}
  AUTH_JWT_EXPIRATION: {{ .Values.secrets.jwtExpiration | quote }}
  AUTH_ADMIN_USERNAME: {{ required "secrets.authAdminUsername is required" .Values.secrets.authAdminUsername | quote }}
  AUTH_ADMIN_PASSWORD: {{ required "secrets.authAdminPassword is required" .Values.secrets.authAdminPassword | quote }}
  AUTH_AUDITOR_USERNAME: {{ required "secrets.authAuditorUsername is required" .Values.secrets.authAuditorUsername | quote }}
  AUTH_AUDITOR_PASSWORD: {{ required "secrets.authAuditorPassword is required" .Values.secrets.authAuditorPassword | quote }}
  AUTH_USER_USERNAME: {{ required "secrets.authUserUsername is required" .Values.secrets.authUserUsername | quote }}
  AUTH_USER_PASSWORD: {{ required "secrets.authUserPassword is required" .Values.secrets.authUserPassword | quote }}
  AUDIT_LEDGER_CONTRACT_ADDRESS: {{ .Values.secrets.auditLedgerContractAddress | quote }}
  AUDIT_LEDGER_CONTRACT_DEPLOYMENT_BLOCK: {{ .Values.secrets.auditLedgerContractDeploymentBlock | quote }}
  GANACHE_PRIVATE_KEY: {{ .Values.secrets.ganachePrivateKey | quote }}
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: dal-postgres
  namespace: {{ $ns }}
spec:
  serviceName: dal-postgres
  replicas: 1
  selector:
    matchLabels:
      app: dal-postgres
  template:
    metadata:
      labels:
        app: dal-postgres
    spec:
      containers:
        - name: postgres
          image: {{ .Values.images.postgres }}
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: audit_ledger
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: dal-secrets
                  key: DB_USERNAME
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: dal-secrets
                  key: DB_PASSWORD
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
          {{ with .Values.resources.postgres }}
          resources:
{{ toYaml . | nindent 12 }}
          {{ end }}
  volumeClaimTemplates:
    - metadata:
        name: postgres-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: {{ .Values.persistence.postgresSize }}
---
apiVersion: v1
kind: Service
metadata:
  name: dal-postgres
  namespace: {{ $ns }}
spec:
  selector:
    app: dal-postgres
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: dal-zookeeper
  namespace: {{ $ns }}
spec:
  serviceName: dal-zookeeper
  replicas: 1
  selector:
    matchLabels:
      app: dal-zookeeper
  template:
    metadata:
      labels:
        app: dal-zookeeper
    spec:
      containers:
        - name: zookeeper
          image: {{ .Values.images.zookeeper }}
          ports:
            - containerPort: 2181
          env:
            - name: ZOOKEEPER_CLIENT_PORT
              value: "2181"
            - name: ZOOKEEPER_TICK_TIME
              value: "2000"
          volumeMounts:
            - name: zookeeper-data
              mountPath: /var/lib/zookeeper/data
          {{ with .Values.resources.zookeeper }}
          resources:
{{ toYaml . | nindent 12 }}
          {{ end }}
  volumeClaimTemplates:
    - metadata:
        name: zookeeper-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: {{ .Values.persistence.zookeeperSize }}
---
apiVersion: v1
kind: Service
metadata:
  name: dal-zookeeper
  namespace: {{ $ns }}
spec:
  selector:
    app: dal-zookeeper
  ports:
    - name: client
      port: 2181
      targetPort: 2181
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: dal-kafka
  namespace: {{ $ns }}
spec:
  serviceName: dal-kafka
  replicas: 1
  selector:
    matchLabels:
      app: dal-kafka
  template:
    metadata:
      labels:
        app: dal-kafka
    spec:
      containers:
        - name: kafka
          image: {{ .Values.images.kafka }}
          ports:
            - containerPort: 9092
          env:
            - name: KAFKA_BROKER_ID
              value: "1"
            - name: KAFKA_ZOOKEEPER_CONNECT
              value: dal-zookeeper:2181
            - name: KAFKA_LISTENERS
              value: PLAINTEXT://0.0.0.0:9092
            - name: KAFKA_ADVERTISED_LISTENERS
              value: PLAINTEXT://dal-kafka:9092
            - name: KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR
              value: "1"
            - name: KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR
              value: "1"
            - name: KAFKA_TRANSACTION_STATE_LOG_MIN_ISR
              value: "1"
            - name: KAFKA_AUTO_CREATE_TOPICS_ENABLE
              value: "true"
          volumeMounts:
            - name: kafka-data
              mountPath: /var/lib/kafka/data
          {{ with .Values.resources.kafka }}
          resources:
{{ toYaml . | nindent 12 }}
          {{ end }}
  volumeClaimTemplates:
    - metadata:
        name: kafka-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: {{ .Values.persistence.kafkaSize }}
---
apiVersion: v1
kind: Service
metadata:
  name: dal-kafka
  namespace: {{ $ns }}
spec:
  selector:
    app: dal-kafka
  ports:
    - name: kafka
      port: 9092
      targetPort: 9092
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: command-service
  namespace: {{ $ns }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: command-service
  template:
    metadata:
      labels:
        app: command-service
    spec:
      containers:
        - name: command-service
          image: {{ .Values.images.commandService }}
          ports:
            - containerPort: 8081
          envFrom:
            - configMapRef:
                name: dal-config
            - secretRef:
                name: dal-secrets
          {{ with .Values.resources.commandService }}
          resources:
{{ toYaml . | nindent 12 }}
          {{ end }}
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8081
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8081
            initialDelaySeconds: 30
            periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: command-service
  namespace: {{ $ns }}
spec:
  selector:
    app: command-service
  ports:
    - name: http
      port: 8081
      targetPort: 8081
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: event-store-service
  namespace: {{ $ns }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: event-store-service
  template:
    metadata:
      labels:
        app: event-store-service
    spec:
      containers:
        - name: event-store-service
          image: {{ .Values.images.eventStoreService }}
          ports:
            - containerPort: 8082
          envFrom:
            - configMapRef:
                name: dal-config
            - secretRef:
                name: dal-secrets
          {{ with .Values.resources.eventStoreService }}
          resources:
{{ toYaml . | nindent 12 }}
          {{ end }}
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8082
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8082
            initialDelaySeconds: 30
            periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: event-store-service
  namespace: {{ $ns }}
spec:
  selector:
    app: event-store-service
  ports:
    - name: http
      port: 8082
      targetPort: 8082
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: audit-writer-service
  namespace: {{ $ns }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: audit-writer-service
  template:
    metadata:
      labels:
        app: audit-writer-service
    spec:
      containers:
        - name: audit-writer-service
          image: {{ .Values.images.auditWriterService }}
          ports:
            - containerPort: 8083
          envFrom:
            - configMapRef:
                name: dal-config
            - secretRef:
                name: dal-secrets
          {{ with .Values.resources.auditWriterService }}
          resources:
{{ toYaml . | nindent 12 }}
          {{ end }}
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8083
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8083
            initialDelaySeconds: 30
            periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: audit-writer-service
  namespace: {{ $ns }}
spec:
  selector:
    app: audit-writer-service
  ports:
    - name: http
      port: 8083
      targetPort: 8083
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: query-service
  namespace: {{ $ns }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: query-service
  template:
    metadata:
      labels:
        app: query-service
    spec:
      containers:
        - name: query-service
          image: {{ .Values.images.queryService }}
          ports:
            - containerPort: 8084
          envFrom:
            - configMapRef:
                name: dal-config
            - secretRef:
                name: dal-secrets
          {{ with .Values.resources.queryService }}
          resources:
{{ toYaml . | nindent 12 }}
          {{ end }}
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8084
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8084
            initialDelaySeconds: 30
            periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: query-service
  namespace: {{ $ns }}
spec:
  selector:
    app: query-service
  ports:
    - name: http
      port: 8084
      targetPort: 8084
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: audit-ui
  namespace: {{ $ns }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: audit-ui
  template:
    metadata:
      labels:
        app: audit-ui
    spec:
      containers:
        - name: audit-ui
          image: {{ .Values.images.auditUi }}
          ports:
            - containerPort: 80
          env:
            - name: QUERY_SERVICE_BASE_URL
              valueFrom:
                configMapKeyRef:
                  name: dal-config
                  key: QUERY_SERVICE_BASE_URL
          {{ with .Values.resources.auditUi }}
          resources:
{{ toYaml . | nindent 12 }}
          {{ end }}
---
apiVersion: v1
kind: Service
metadata:
  name: audit-ui
  namespace: {{ $ns }}
spec:
  selector:
    app: audit-ui
  ports:
    - name: http
      port: 80
      targetPort: 80
{{ if .Values.ingress.enabled }}
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: dal-ingress
  namespace: {{ $ns }}
spec:
  ingressClassName: {{ .Values.ingress.className }}
  rules:
    - host: {{ .Values.ingress.host }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: audit-ui
                port:
                  number: 80
          - path: /commands
            pathType: Prefix
            backend:
              service:
                name: command-service
                port:
                  number: 8081
          - path: /auth
            pathType: Prefix
            backend:
              service:
                name: command-service
                port:
                  number: 8081
          - path: /api/audit-logs
            pathType: Prefix
            backend:
              service:
                name: query-service
                port:
                  number: 8084
          - path: /api/reconciliation
            pathType: Prefix
            backend:
              service:
                name: query-service
                port:
                  number: 8084
{{ end }}

