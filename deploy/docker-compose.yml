services:

  postgres:
    image: postgres:16
    container_name: dal-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - dal-net

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    container_name: dal-zookeeper
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "${ZOOKEEPER_PORT}:2181"
    networks:
      - dal-net

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: dal-kafka
    restart: unless-stopped
    depends_on:
      - zookeeper
    ports:
      - "${KAFKA_PORT}:29092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,PLAINTEXT_HOST://0.0.0.0:29092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:${KAFKA_PORT}
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:9092 --list"]
      interval: 15s
      timeout: 10s
      retries: 5
    networks:
      - dal-net

  kafka-ui:
    image: provectuslabs/kafka-ui:v0.7.2
    container_name: dal-kafka-ui
    restart: unless-stopped
    depends_on:
      - kafka
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
      KAFKA_CLUSTERS_0_ZOOKEEPER: zookeeper:2181
    networks:
      - dal-net

  ganache:
    image: trufflesuite/ganache:v7.9.1
    container_name: dal-ganache
    restart: unless-stopped
    command:
      - --wallet.totalAccounts
      - "10"
      - --wallet.mnemonic
      - "test test test test test test test test test test test junk"
      - --chain.chainId
      - "1337"
      - --server.host
      - "0.0.0.0"
      - --server.port
      - "8545"
    ports:
      - "${GANACHE_PORT}:8545"
    volumes:
      - ./ganache-healthcheck.js:/opt/healthchecks/ganache-healthcheck.js:ro
    healthcheck:
      test: ["CMD", "node", "/opt/healthchecks/ganache-healthcheck.js"]
      interval: 10s
      timeout: 10s
      retries: 10
    networks:
      - dal-net

  pgadmin:
    image: dpage/pgadmin4:8.7
    container_name: dal-pgadmin
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD}
    ports:
      - "${PGADMIN_PORT}:80"
    networks:
      - dal-net

volumes:
  postgres-data:

networks:
  dal-net:
    driver: bridge
