name: CI

on:
  push:
    branches: [ main ]
  pull_request:

permissions:
  contents: read

jobs:

  backend:
    name: Backend (Maven)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 25
          cache: maven

      - name: Run backend tests
        run: mvn -B -ntp -f backend/pom.xml verify

  frontend:
    name: Frontend (Angular)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Use Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/audit-ui/package-lock.json

      - name: Install dependencies
        working-directory: frontend/audit-ui
        run: npm ci --ignore-scripts

      - name: Run tests (headless)
        working-directory: frontend/audit-ui
        run: npm run test:headless -- --code-coverage

      - name: Upload frontend coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: frontend/audit-ui/coverage/audit-ui/lcov.info
          if-no-files-found: warn
          retention-days: 7

      - name: Build frontend
        working-directory: frontend/audit-ui
        run: npm run build

  blockchain:
    name: Blockchain (Hardhat)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Use Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: blockchain/package-lock.json

      - name: Install dependencies
        working-directory: blockchain
        run: npm ci --ignore-scripts

      - name: Compile contracts
        working-directory: blockchain
        run: npm run compile

      - name: Run Hardhat tests
        working-directory: blockchain
        run: npm test

  sonar-backend:
    name: SonarQube - backend
    runs-on: ubuntu-latest
    needs: [backend]
    if: >
      ((github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'pull_request' && github.actor != 'dependabot[bot]'))
    outputs:
      sonar_skipped: ${{ steps.sonar-check.outputs.sonar_skipped }}
    env:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      SONAR_HOST_URL: ${{ vars.SONAR_HOST_URL }}
      SONAR_ORGANIZATION: ${{ vars.SONAR_ORGANIZATION }}

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Check Sonar configuration
        id: sonar-check
        run: |
          if [ -z "$SONAR_TOKEN" ]; then
            echo "sonar_skipped=true" >> $GITHUB_OUTPUT
            echo "SONAR_TOKEN not set; skipping backend analysis"
            exit 0
          fi
          # For SonarCloud (default), organization is required
          host_url="${SONAR_HOST_URL:-https://sonarcloud.io}"
          if [ "$host_url" = "https://sonarcloud.io" ] && [ -z "$SONAR_ORGANIZATION" ]; then
            echo "sonar_skipped=true" >> $GITHUB_OUTPUT
            echo "SONAR_ORGANIZATION not set for SonarCloud; skipping backend analysis"
            exit 0
          fi
          echo "sonar_skipped=false" >> $GITHUB_OUTPUT
          echo "sonar_enabled=true" >> $GITHUB_OUTPUT
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ vars.SONAR_HOST_URL }}
          SONAR_ORGANIZATION: ${{ vars.SONAR_ORGANIZATION }}

      - name: Set up JDK 25
        if: steps.sonar-check.outputs.sonar_enabled == 'true'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 25
          cache: maven

      - name: Run SonarQube analysis (backend)
        if: steps.sonar-check.outputs.sonar_enabled == 'true'
        shell: bash
        env:
          REPO_NAME: ${{ github.event.repository.name }}
        run: |
          host_url="${SONAR_HOST_URL:-https://sonarcloud.io}"
          cmd=(
            mvn -B -ntp
            -f backend/pom.xml
            -DskipTests
            verify
            sonar:sonar
            "-Dsonar.host.url=${host_url}"
            "-Dsonar.projectKey=${REPO_NAME}-backend"
          )

          if [ -n "${SONAR_ORGANIZATION}" ]; then
            cmd+=("-Dsonar.organization=${SONAR_ORGANIZATION}")
          fi

          "${cmd[@]}"

  sonar-frontend:
    name: SonarQube - frontend
    runs-on: ubuntu-latest
    needs: [frontend]
    if: >
      ((github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'pull_request' && github.actor != 'dependabot[bot]'))
    outputs:
      sonar_skipped: ${{ steps.sonar-check.outputs.sonar_skipped }}
    env:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      SONAR_HOST_URL: ${{ vars.SONAR_HOST_URL }}
      SONAR_ORGANIZATION: ${{ vars.SONAR_ORGANIZATION }}

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Check Sonar configuration
        id: sonar-check
        run: |
          if [ -z "$SONAR_TOKEN" ]; then
            echo "sonar_skipped=true" >> $GITHUB_OUTPUT
            echo "SONAR_TOKEN not set; skipping frontend analysis"
            exit 0
          fi
          # For SonarCloud (default), organization is required
          host_url="${SONAR_HOST_URL:-https://sonarcloud.io}"
          if [ "$host_url" = "https://sonarcloud.io" ] && [ -z "$SONAR_ORGANIZATION" ]; then
            echo "sonar_skipped=true" >> $GITHUB_OUTPUT
            echo "SONAR_ORGANIZATION not set for SonarCloud; skipping frontend analysis"
            exit 0
          fi
          echo "sonar_skipped=false" >> $GITHUB_OUTPUT
          echo "sonar_enabled=true" >> $GITHUB_OUTPUT
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ vars.SONAR_HOST_URL }}
          SONAR_ORGANIZATION: ${{ vars.SONAR_ORGANIZATION }}

      - name: Download frontend coverage report
        if: steps.sonar-check.outputs.sonar_enabled == 'true'
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: frontend-coverage
          path: frontend/audit-ui/coverage

      - name: Normalize frontend lcov path for Sonar
        if: steps.sonar-check.outputs.sonar_enabled == 'true'
        shell: bash
        run: |
          expected="frontend/audit-ui/coverage/audit-ui/lcov.info"
          found=$(find frontend/audit-ui/coverage -name "lcov.info" 2>/dev/null | head -1 || true)
          if [ -n "$found" ] && [ "$found" != "$expected" ]; then
            mkdir -p "$(dirname "$expected")"
            cp "$found" "$expected"
            echo "Reorganized lcov: $found -> $expected"
          fi
          if [ ! -f "$expected" ]; then
            echo "lcov.info not found; Sonar will run without coverage input"
          fi

      - name: Run SonarQube analysis (frontend)
        if: steps.sonar-check.outputs.sonar_enabled == 'true'
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_HOST_URL: ${{ vars.SONAR_HOST_URL || 'https://sonarcloud.io' }}
        with:
          projectBaseDir: frontend/audit-ui
          args: >
            -Dsonar.projectKey=${{ github.event.repository.name }}-frontend
            -Dsonar.sources=src
            -Dsonar.tests=src
            -Dsonar.test.inclusions=**/*.spec.ts
            -Dsonar.javascript.lcov.reportPaths=coverage/audit-ui/lcov.info
            ${{ vars.SONAR_ORGANIZATION != '' && format('-Dsonar.organization={0}', vars.SONAR_ORGANIZATION) || '' }}

  sonar-blockchain:
    name: SonarQube - blockchain
    runs-on: ubuntu-latest
    needs: [blockchain]
    if: >
      ((github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'pull_request' && github.actor != 'dependabot[bot]'))
    outputs:
      sonar_skipped: ${{ steps.sonar-check.outputs.sonar_skipped }}
    env:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      SONAR_HOST_URL: ${{ vars.SONAR_HOST_URL }}
      SONAR_ORGANIZATION: ${{ vars.SONAR_ORGANIZATION }}

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Check Sonar configuration
        id: sonar-check
        run: |
          if [ -z "$SONAR_TOKEN" ]; then
            echo "sonar_skipped=true" >> $GITHUB_OUTPUT
            echo "SONAR_TOKEN not set; skipping blockchain analysis"
            exit 0
          fi
          # For SonarCloud (default), organization is required
          host_url="${SONAR_HOST_URL:-https://sonarcloud.io}"
          if [ "$host_url" = "https://sonarcloud.io" ] && [ -z "$SONAR_ORGANIZATION" ]; then
            echo "sonar_skipped=true" >> $GITHUB_OUTPUT
            echo "SONAR_ORGANIZATION not set for SonarCloud; skipping blockchain analysis"
            exit 0
          fi
          echo "sonar_skipped=false" >> $GITHUB_OUTPUT
          echo "sonar_enabled=true" >> $GITHUB_OUTPUT
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ vars.SONAR_HOST_URL }}
          SONAR_ORGANIZATION: ${{ vars.SONAR_ORGANIZATION }}

      - name: Run SonarQube analysis (blockchain)
        if: steps.sonar-check.outputs.sonar_enabled == 'true'
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_HOST_URL: ${{ vars.SONAR_HOST_URL || 'https://sonarcloud.io' }}
        with:
          projectBaseDir: blockchain
          args: >
            -Dsonar.projectKey=${{ github.event.repository.name }}-blockchain
            -Dsonar.sources=contracts,scripts
            -Dsonar.tests=test
            -Dsonar.exclusions=node_modules/**,artifacts/**,cache/**
            ${{ vars.SONAR_ORGANIZATION != '' && format('-Dsonar.organization={0}', vars.SONAR_ORGANIZATION) || '' }}

  notify-telegram:
    name: Notify Telegram
    runs-on: ubuntu-latest
    needs: [backend, frontend, blockchain, sonar-backend, sonar-frontend, sonar-blockchain]
    if: ${{ always() }}
    permissions:
      contents: read
    env:
      TELEGRAM_TO: ${{ secrets.TELEGRAM_TO }}
      TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}

    steps:
      - uses: actions/checkout@v6

      - name: Compose Telegram message
        id: compose
        run: python3 .github/scripts/compose_telegram_message.py
        env:
          BACKEND_RESULT: ${{ needs.backend.result }}
          FRONTEND_RESULT: ${{ needs.frontend.result }}
          BLOCKCHAIN_RESULT: ${{ needs.blockchain.result }}
          SONAR_BACKEND_RESULT: ${{ needs.sonar-backend.result }}
          SONAR_FRONTEND_RESULT: ${{ needs.sonar-frontend.result }}
          SONAR_BLOCKCHAIN_RESULT: ${{ needs.sonar-blockchain.result }}
          SONAR_BACKEND_SKIPPED: ${{ needs.sonar-backend.outputs.sonar_skipped }}
          SONAR_FRONTEND_SKIPPED: ${{ needs.sonar-frontend.outputs.sonar_skipped }}
          SONAR_BLOCKCHAIN_SKIPPED: ${{ needs.sonar-blockchain.outputs.sonar_skipped }}

      - name: Notify Telegram
        if: ${{ env.TELEGRAM_TO != '' && env.TELEGRAM_TOKEN != '' }}
        uses: appleboy/telegram-action@v1.0.1
        with:
          to: ${{ secrets.TELEGRAM_TO }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          message: ${{ steps.compose.outputs.message }}
          format: html

      - name: Telegram skipped (missing secrets)
        if: ${{ env.TELEGRAM_TO == '' || env.TELEGRAM_TOKEN == '' }}
        run: echo "TELEGRAM_TO and/or TELEGRAM_TOKEN are not set. Skipping Telegram notification."

